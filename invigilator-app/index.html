<head>

  <style>
    :root {
      --blue:  #003C71;
      --green: #1a7a4a;
      --red:   #C8102E;
      --gold:  #FFB81C;
      --bg:    #eef2f7;
      --shadow: 0 2px 14px rgba(0,0,0,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body { background: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 32px; }

    /* ── HEADER ────────────────────────────── */
    .hdr {
      background: var(--blue);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hdr-logo {
      width: 46px; height: 46px; border-radius: 50%;
      background: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 11px; color: var(--blue); flex-shrink: 0; line-height: 1.2;
      text-align: center;
    }
    .hdr h1 { margin: 0; font-size: 1.05rem; font-weight: 700; }
    .hdr p  { margin: 0; font-size: 0.75rem; opacity: .75; }

    /* ── PHASE TABS ────────────────────────── */
    .phase-nav {
      background: #fff;
      border-bottom: 1px solid #ddd;
      display: flex;
      overflow-x: auto;
      padding: 0 12px;
      gap: 4px;
    }
    .p-tab {
      border: none; background: none; cursor: pointer;
      padding: 13px 18px;
      font-size: .85rem; font-weight: 600; color: #777;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      display: flex; align-items: center; gap: 7px;
      transition: color .2s, border-color .2s;
    }
    .p-tab.active { color: var(--tc); border-bottom-color: var(--tc); }
    .p-tab:hover:not(.active) { color: #333; background: #f5f5f5; }

    /* ── PROGRESS ──────────────────────────── */
    .prog-area { max-width: 1100px; margin: 14px auto 0; padding: 0 16px; }
    .prog-lbl  { font-size: .78rem; color: #666; margin-bottom: 5px; }
    .prog-bar-wrap { height: 5px; background: #dde3ec; border-radius: 3px; overflow: hidden; }
    .prog-bar { height: 100%; border-radius: 3px; transition: width .4s ease; }

    /* ── MAIN GRID ─────────────────────────── */
    .main {
      max-width: 1100px;
      margin: 14px auto 0;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 760px) { .main { grid-template-columns: 1fr; } }

    /* ── IMAGE PANEL ───────────────────────── */
    .img-panel {
      background: #1a1a2e;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      height: 540px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .img-panel img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .ann-overlay {
      position: absolute; inset: 0;
      pointer-events: none;
    }

    /* ── ANNOTATION DOT ────────────────────── */
    .ann-dot {
      position: absolute;
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 3px solid #fff;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 10;
      animation: pulse 1.8s infinite;
      cursor: default;
    }
    .ann-dot.active { display: flex; align-items: center; justify-content: center; }
    .ann-dot span { font-size: 10px; font-weight: 900; color: #fff; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,184,28,.75); }
      65%  { box-shadow: 0 0 0 16px rgba(255,184,28,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,184,28,0); }
    }

    /* ── INFO PLACEHOLDER (no-image steps) ─── */
    .img-placeholder {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
      border-radius: 14px;
      height: 540px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: #99a;
    }
    .img-placeholder .ph-icon { font-size: 5rem; }
    .img-placeholder p { font-size: .82rem; }

    /* ── INFO PANEL ────────────────────────── */
    .info-panel {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .phase-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .4px;
      color: #fff;
      margin-bottom: 10px;
      width: fit-content;
    }
    .step-title { font-size: 1.1rem; font-weight: 800; color: #1a1a2e; margin-bottom: 3px; }
    .step-sub   { font-size: .8rem; color: #888; margin-bottom: 12px; }
    .step-desc  { font-size: .875rem; color: #444; line-height: 1.65; margin-bottom: 16px; }

    /* Annotation callout */
    .ann-box {
      border-radius: 0 10px 10px 0;
      padding: 12px 14px;
      margin-bottom: 14px;
      border-left: 4px solid var(--gold);
      background: #fffcee;
      min-height: 64px;
      transition: background .25s;
    }
    .ann-box.warn { border-left-color: var(--red); background: #fff5f5; }
    .ann-box-lbl  { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #aaa; margin-bottom: 5px; }
    .ann-box-txt  { font-size: .875rem; color: #222; line-height: 1.55; }

    /* Pip dots */
    .pips { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
    .pip  {
      width: 9px; height: 9px; border-radius: 50%;
      background: #dde; cursor: pointer;
      transition: background .2s, transform .2s;
    }
    .pip.active { background: var(--gold); transform: scale(1.4); }
    .pip.done   { background: #b0bec5; }
    .pip-count  { font-size: .72rem; color: #aaa; margin-left: 4px; }

    /* Info items (no-image steps) */
    .info-list { margin-top: 6px; }
    .info-row  {
      display: flex; gap: 11px; align-items: flex-start;
      padding: 9px 0; border-bottom: 1px solid #f0f0f0;
      font-size: .875rem; color: #333; line-height: 1.5;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .ico { font-size: 1.2rem; flex-shrink: 0; }

    /* Warning stripe */
    .warn-stripe {
      background: #fff0f0; border: 1.5px solid #f5c6c6;
      border-radius: 8px; padding: 10px 13px; margin-top: 8px;
      font-size: .8rem; color: #a00;
      display: flex; gap: 8px; align-items: flex-start;
    }

    /* ── BOTTOM NAV ────────────────────────── */
    .nav-bar {
      max-width: 1100px;
      margin: 14px auto 0;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-nav {
      padding: 10px 20px;
      border: none; border-radius: 9px;
      font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: filter .15s, opacity .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-nav:disabled { opacity: .38; cursor: not-allowed; }
    .btn-nav:not(:disabled):hover { filter: brightness(.93); }
    .btn-prev { background: #e4eaf3; color: #3a4a5c; }
    .btn-ann  { background: #fff3cc; color: #7a5700; border: 1.5px solid var(--gold); }
    .btn-ann:not(:disabled):hover { background: var(--gold); color: #fff; }
    .btn-next { color: #fff; }
    .nav-mid  { flex: 1; text-align: center; font-size: .75rem; color: #999; }

    /* ── FINISH SCREEN ─────────────────────── */
    .finish-screen {
      background: #fff; border-radius: 14px; padding: 48px 32px;
      text-align: center; box-shadow: var(--shadow);
      grid-column: 1 / -1;
    }
    .finish-screen .big { font-size: 3.5rem; }
    .finish-screen h2 { font-size: 1.4rem; font-weight: 800; color: #1a1a2e; margin: 12px 0 8px; }
    .finish-screen p  { color: #666; max-width: 480px; margin: 0 auto; font-size: .9rem; }

    /* fade transition */
    .fade-in { animation: fadeUp .3s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  </style>
</head>

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = { pi: 0, si: 0, ai: 0, timer: null };

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  const phase = PHASES[S.pi];
  const step  = phase.steps[S.si];
  const total = phase.steps.length;

  // Phase tabs
  const nav = document.getElementById('phaseNav');
  nav.innerHTML = '';
  PHASES.forEach((ph, i) => {
    const b = document.createElement('button');
    b.className = 'p-tab' + (i === S.pi ? ' active' : '');
    b.style.setProperty('--tc', ph.color);
    b.innerHTML = `<span>${ph.icon}</span>${ph.label}`;
    b.onclick = () => { S.pi = i; S.si = 0; S.ai = 0; render(); };
    nav.appendChild(b);
  });

  // Progress
  document.getElementById('progLbl').textContent =
    `${phase.label} — Step ${S.si + 1} of ${total}`;
  const bar = document.getElementById('progBar');
  bar.style.width   = `${((S.si + 1) / total) * 100}%`;
  bar.style.background = phase.color;

  // Main grid
  const main = document.getElementById('main');
  main.innerHTML = '';
  main.className = 'main fade-in';

  main.appendChild(step.image ? buildImgPanel(step) : buildPlaceholder(step));
  main.appendChild(buildInfoPanel(step, phase));

  // Bottom nav
  const isFirst = S.pi === 0 && S.si === 0;
  const isLast  = S.pi === PHASES.length - 1 && S.si === total - 1;
  const hasAnns = step.ann && step.ann.length > 1;

  document.getElementById('btnPrev').disabled = isFirst;
  document.getElementById('btnAnn').style.display = hasAnns ? 'flex' : 'none';
  const btnNext = document.getElementById('btnNext');
  btnNext.style.background = phase.color;
  btnNext.textContent = isLast ? 'Finish ✓' : 'Next Step →';
  document.getElementById('navMid').textContent = `${S.si + 1} / ${total}`;

  // Auto-cycle annotations
  clearTimeout(S.timer);
  if (step.ann && step.ann.length > 0) cycleAnn(step);
}

// ── Build image panel ───────────────────────
function buildImgPanel(step) {
  const wrap = document.createElement('div');
  wrap.className = 'img-panel';

  const img = document.createElement('img');
  img.src = step.image;
  img.alt = step.title;
  wrap.appendChild(img);

  const overlay = document.createElement('div');
  overlay.className = 'ann-overlay';
  overlay.id = 'annOverlay';
  wrap.appendChild(overlay);

  const place = () => placeDots(img, step.ann, PHASES[S.pi].color);
  img.addEventListener('load', place);
  if (img.complete && img.naturalWidth) place();
  window.addEventListener('resize', place, { once: false });

  return wrap;
}

function placeDots(img, anns, color) {
  const overlay = document.getElementById('annOverlay');
  if (!overlay || !anns || !anns.length) return;
  overlay.innerHTML = '';

  const cW = img.clientWidth;
  const cH = img.clientHeight;
  const nW = img.naturalWidth  || cW;
  const nH = img.naturalHeight || cH;

  const scale = Math.min(cW / nW, cH / nH);
  const rW = nW * scale, rH = nH * scale;
  const oX = (cW - rW) / 2, oY = (cH - rH) / 2;

  anns.forEach((a, i) => {
    const px = oX + (a.x / 100) * rW;
    const py = oY + (a.y / 100) * rH;
    const dot = document.createElement('div');
    dot.className = 'ann-dot' + (i === S.ai ? ' active' : '');
    dot.id = `dot${i}`;
    dot.style.left = px + 'px';
    dot.style.top  = py + 'px';
    dot.style.background = color;
    dot.innerHTML = `<span>${i + 1}</span>`;
    overlay.appendChild(dot);
  });
}

// ── Build placeholder for info-only steps ───
function buildPlaceholder(step) {
  const d = document.createElement('div');
  d.className = 'img-placeholder';
  d.innerHTML = `<div class="ph-icon">${step.icon || '📱'}</div><p>Follow the steps on the right</p>`;
  return d;
}

// ── Build info panel ────────────────────────
function buildInfoPanel(step, phase) {
  const panel = document.createElement('div');
  panel.className = 'info-panel';

  // Badge
  const badge = el('div', 'phase-badge', `${phase.icon} ${phase.label}`);
  badge.style.background = phase.color;
  panel.appendChild(badge);

  panel.appendChild(el('div', 'step-title', step.title));
  panel.appendChild(el('div', 'step-sub',   step.sub));
  const desc = el('div', 'step-desc');
  desc.innerHTML = step.desc;
  panel.appendChild(desc);

  // Annotation highlight box (for image steps)
  if (step.image && step.ann && step.ann.length) {
    const box = document.createElement('div');
    box.className = 'ann-box' + (step.warn ? ' warn' : '');
    box.id = 'annBox';

    const lbl = el('div', 'ann-box-lbl');
    lbl.id = 'annLbl';
    lbl.textContent = `🔍 Focus point ${S.ai + 1} of ${step.ann.length}`;
    box.appendChild(lbl);

    const txt = el('div', 'ann-box-txt');
    txt.id = 'annTxt';
    txt.innerHTML = step.ann[S.ai].t;
    box.appendChild(txt);
    panel.appendChild(box);

    // Pip row
    const pips = el('div', 'pips');
    pips.id = 'pips';
    step.ann.forEach((_, i) => {
      const pip = el('div', 'pip' + (i === S.ai ? ' active' : (i < S.ai ? ' done' : '')));
      pip.onclick = () => { S.ai = i; updateAnn(step, phase.color); };
      pips.appendChild(pip);
    });
    const cnt = el('span', 'pip-count');
    cnt.id = 'pipCnt';
    cnt.textContent = `${S.ai + 1} / ${step.ann.length}`;
    pips.appendChild(cnt);
    panel.appendChild(pips);
  }

  // Info list (for info-only steps)
  if (step.items && step.items.length) {
    const list = el('div', 'info-list');
    step.items.forEach(item => {
      const row = el('div', 'info-row');
      row.innerHTML = `<span class="ico">${item.i}</span><span>${item.t}</span>`;
      list.appendChild(row);
    });
    panel.appendChild(list);
  }

  // Warning stripe
  if (step.warn) {
    const w = el('div', 'warn-stripe');
    w.innerHTML = '<span>⚠️</span><div>This step has critical deadlines. Failing to meet them may result in your assessment not being marked.</div>';
    panel.appendChild(w);
  }

  return panel;
}

// ═══════════════════════════════════════════════════════════
// ANNOTATION CYCLING
// ═══════════════════════════════════════════════════════════
function cycleAnn(step) {
  S.timer = setTimeout(() => {
    S.ai = (S.ai + 1) % step.ann.length;
    updateAnn(step, PHASES[S.pi].color);
    cycleAnn(step);
  }, 3500);
}

function updateAnn(step, color) {
  // Dots
  document.querySelectorAll('.ann-dot').forEach((d, i) => {
    d.classList.toggle('active', i === S.ai);
  });
  // Pips
  document.querySelectorAll('.pip').forEach((p, i) => {
    p.className = 'pip' + (i === S.ai ? ' active' : (i < S.ai ? ' done' : ''));
  });
  // Text
  const txt = document.getElementById('annTxt');
  const lbl = document.getElementById('annLbl');
  const cnt = document.getElementById('pipCnt');
  if (txt) txt.innerHTML  = step.ann[S.ai].t;
  if (lbl) lbl.textContent = `🔍 Focus point ${S.ai + 1} of ${step.ann.length}`;
  if (cnt) cnt.textContent = `${S.ai + 1} / ${step.ann.length}`;
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function go(dir) {
  clearTimeout(S.timer);
  const phase = PHASES[S.pi];
  const step  = phase.steps[S.si];

  if (dir === 'ann') {
    S.ai = (S.ai + 1) % step.ann.length;
    updateAnn(step, phase.color);
    cycleAnn(step);
    return;
  }
  if (dir === 'next') {
    if (S.si < phase.steps.length - 1) { S.si++; }
    else if (S.pi < PHASES.length - 1) { S.pi++; S.si = 0; }
  }
  if (dir === 'prev') {
    if (S.si > 0) { S.si--; }
    else if (S.pi > 0) { S.pi--; S.si = PHASES[S.pi].steps.length - 1; }
  }
  S.ai = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go('next');
  if (e.key === 'ArrowLeft')  go('prev');
  if (e.key === 'ArrowDown')  go('ann');
});

// ── Utility ─────────────────────────────────
function el(tag, cls, text) {
  const d = document.createElement(tag);
  if (cls)  d.className = cls;
  if (text) d.textContent = text;
  return d;
}

// ── Boot ─────────────────────────────────────
render();
</script>
